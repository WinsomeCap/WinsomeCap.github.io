<!DOCTYPE HTML>
<head>
<title>(in)Complete search engine</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>
<style>
h1 {text-align: center;}
label {
  position: absolute;
  top: 10%;
  width: 100%;
  text-align: center;
  font-size: 20px;
}
.query {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  font-size: 20px;
  float: left;
}
.lang {
  position: absolute;
  top: 10%;
  left: 70%;
  text-align: center;
  font-size: 20px;
  float: left;
}
h2 {
  position: absolute;
  top: 22%;
  clear: both;
  width: 100%;
  text-align: center;
}
p {
  position: absolute;
  top: 26%;
  clear: both;
  width: 100%;
  text-align: center;
}
</style>
<div>
<h1>(in)Complete foundation search engine.</h1>
<label for="query">Please enter a search query:</label>
<input type="text" id="lang" name="lang" class="lang" placeholder="ISO 639-1 language code"><br><br>
<input type="text" id="query" name="query" class="query"><br><br>
<button onclick="explainCodes();">Click here to learn how the language codes work</button>
</div>
<div>
<h2 id="word"></h2>
<p id="def"></p>
</div>
<script>
document.getElementById("lang").value = "en";
var term = "";
var isobox = document.getElementById("lang");
var query = document.getElementById("query");
query.addEventListener("keydown", function (e) {
    if (e.code === "Enter") {  //checks whether the pressed key is "Enter"
        send();
    }
});
isobox.addEventListener("keydown", function (e) {
    if (e.code === "Enter") {  //checks whether the pressed key is "Enter"
        send();
    }
});
async function explainCodes()
{
	if(confirm("This system uses for the most part ISO 639-1 two letter language codes. In the event where there is not a two-letter code for the language, type \"Other\".\nClick OK to open a list of available codes. Otherwise, click Cancel."))
	{let url='https://en.wikipedia.org/wiki/List_of_ISO_639_language_codes#Table';window.open(url, '_blank').focus();}
}
async function send()
{
	let d = document.getElementById("def");
			let string = "";
			if(query.value != "")
			{
			string = query.value;
			term = string
			}
			else
			{
			string = term;
			}
			query.value = "";
			d.reset;
			tell(string);
}
async function tell(q){
	const result = await search(q);
	//console.log(result);
	let d = document.getElementById("def");
	let w = document.getElementById("word");
	w.innerText = q;
	console.log(result);
	let brokenTags = [".mw-parser-output",".object-usage-tag",".mw-parser-output",".deprecated"]
	if(result != "")
	{
	let text = result.replace(/<\/?[^>]+(>|$)/g, "").replace(/{\/?[^}]+(}|$)/g, "")
	for (let i = 0; i < brokenTags.length; i++) {
		text = text.replace(brokenTags[i],"");
	}
	d.innerText = text;
	}
	else
	{
	d.innerText = "No definition available in target language";
	}
}
let output = '';
async function search(word) {
	output = '';
	let endpoint = 'https://en.wiktionary.org/api/rest_v1/page/definition';
	let filter = new RegExp('< *\\/? *[a-z]+ *( [a-z]+="[^<>"]+" *)* *\\/? *>', 'ig');

	let url = `${endpoint}/${word}`;
	let resObj =  await fetch(url, {orgin:'test'});
	let res = await resObj.json();
	let lang = document.getElementById("lang").value;
	console.log(lang);
	function cleanString(str) {
		return str.replaceAll(filter, '').replaceAll('&nbsp;', ' ');
	}
	for (let meaning of res[lang]) {
		output += `${meaning.language}\n`
		output += meaning.partOfSpeech;
		for (let definition of meaning.definitions) {
			if (definition.definition) {
				let filteredDefinition = cleanString(definition.definition);
				output += `\n- ${filteredDefinition}`;
				if (definition.examples) {
					for (let example of definition.examples) {
						let filteredExample = cleanString(example);
						output += `\n    "${filteredExample}"`;
					}
				}
			}
		}
		output += '\n\n';
	}
	return output;
};

</script>
